<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title> Server Login Page</title>
</head>
<body class="login-page">

<div class="login-box">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <p class="error" id="errorMsg"></p>

    <div class="register-link" style="margin-top: 15px; font-size: 14px; color: #fff;">
        New to the industry? <a href="register.html" style="color: #4facfe; text-decoration: none; font-weight: bold;">Create an Account</a>
    </div>
</div>

<script type="text/javascript">
  async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("errorMsg");

    try {
      // 1. Send the data to your Render API
      const response = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const result = await response.json();

      // 2. Check if the login was successful
      if (response.ok) {
        // Save user info for the dashboard
        localStorage.setItem('userRole', result.role);
        localStorage.setItem('username', result.username);

        // Show success message
        errorMsg.textContent = "Login successful! Redirecting...";
        errorMsg.style.color = "green";

        // 3. Redirect to the dashboard after a short delay
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1500);
        
      } else {
        // Show the "Invalid credentials" or other error from the server
        errorMsg.textContent = result.message;
        errorMsg.style.color = "red";
      }
    } catch (error) {
      errorMsg.textContent = "Cannot connect to the monitoring server.";
      errorMsg.style.color = "red";
    }
  }

  // Attach the function to your button
  document.getElementById("loginBtn").addEventListener("click", login);
</script>

</body>
</html>
