<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title> Server Login Page</title>
</head>
<body class="login-page">

<div class="login-box">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <p class="error" id="errorMsg"></p>

    <div class="register-link" style="margin-top: 15px; font-size: 14px; color: #fff;">
        New to the industry? <a href="register.html" style="color: #4facfe; text-decoration: none; font-weight: bold;">Create an Account</a>
    </div>
</div>

<script type="text/javascript">
  async function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const errorMsg = document.getElementById("errorMsg");

    try {
      // This sends the credentials to your live Node.js server
      const response = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const result = await response.json();

      if (result.success) {
        // Store the admin status for the dashboard
        localStorage.setItem('userRole', result.role);
        localStorage.setItem('username', username);
        window.location.href = "dashboard.html";
      } else {
        errorMsg.textContent = result.message;
      }
    } catch (error) {
      errorMsg.textContent = "Cannot connect to the monitoring server.";
    }
  }

  document.getElementById("loginBtn").addEventListener("click", login);

</script>

</body>
</html>
