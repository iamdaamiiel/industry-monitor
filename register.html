<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="style.css">
  <title>Register - Monitoring Server</title>
</head>
<body class="login-page">
  <div class="login-box">
    <h2>Create Account</h2>
    <input type="text" id="regUsername" placeholder="New Username">
    <input type="password" id="regPassword" placeholder="New Password">
    <select id="regRole" style="width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc;">
      <option value="user">Standard Monitor</option>
      <option value="admin">Administrator</option>
    </select>
    <button id="registerBtn">Register</button>
    <p id="regMsg" class="error"></p>
    <p><a href="index.html">Back to Login</a></p>
  </div>

  <script>
    document.getElementById("registerBtn").addEventListener("click", async () => {
      const username = document.getElementById("regUsername").value;
      const password = document.getElementById("regPassword").value;
      const role = document.getElementById("regRole").value;

      const response = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, role })
      });

      const result = await response.json();
      document.getElementById("regMsg").textContent = result.message;
      if(result.success) document.getElementById("regMsg").style.color = "green";
    });
  </script>
</body>
</html>
